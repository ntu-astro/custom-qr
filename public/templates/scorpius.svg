<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Scorpius (J2000), sky-correct: north up, east left.
    Asterism connections follow Stellarium "western" sky culture
    (stellarium-skycultures/western/index.json, CON western Sco).
    Notable consequences vs popular drawings:
      - Lesath (upsilon Sco) is NOT in any Stellarium line; the stinger
        terminates at Shaula (lambda Sco) only
      - Alniyat (sigma Sco) is NOT a node; no Y-branch through sigma
      - the "head" is a fork radiating from Antares: alpha-delta, alpha-pi,
        alpha-beta. There is no beta-delta-pi spine
      - includes zeta1 Sco between eta and mu1 in the J-curve
    Projection: scale 17 px/deg dec, 216 px per RA hour (cos -32 deg = 0.848),
    centred at (256, 256) with RA_center 16.85h, Dec_center -32 deg.
  -->
  <g fill="#211922" stroke="#211922" stroke-width="18" stroke-linecap="round">
    <!-- spine: stinger tip back through the body to the heart -->
    <line x1="103" y1="343" x2="71"  y2="376"/>          <!-- Shaula - Kappa -->
    <line x1="71"  y1="376" x2="52"  y2="394"/>          <!-- Kappa - Iota1 -->
    <line x1="52"  y1="394" x2="89"  y2="443"/>          <!-- Iota1 - Sargas (theta) -->
    <line x1="89"  y1="443" x2="180" y2="447"/>          <!-- Sargas - Eta -->
    <line x1="180" y1="447" x2="245" y2="432"/>          <!-- Eta - Zeta1 -->
    <line x1="245" y1="432" x2="253" y2="359"/>          <!-- Zeta1 - Mu1 -->
    <line x1="253" y1="359" x2="259" y2="295"/>          <!-- Mu1 - Larawag (epsilon) -->
    <line x1="259" y1="295" x2="310" y2="192"/>          <!-- Larawag - Tau -->
    <line x1="310" y1="192" x2="334" y2="161"/>          <!-- Tau - Antares -->
    <!-- head fork: three lines radiating from Antares to the claw stars -->
    <line x1="334" y1="161" x2="438" y2="97"/>           <!-- Antares - Dschubba (delta) -->
    <line x1="334" y1="161" x2="444" y2="156"/>          <!-- Antares - Pi -->
    <line x1="334" y1="161" x2="420" y2="49"/>           <!-- Antares - Graffias (beta1) -->
  </g>
  <g fill="#211922">
    <circle cx="245" cy="432" r="9"/>                    <!-- Zeta1 Sco, mag 4.79 -->
    <circle cx="444" cy="156" r="14"/>                   <!-- Pi Sco, mag 2.89 -->
    <circle cx="253" cy="359" r="14"/>                   <!-- Mu1 Sco, mag 3.04 -->
    <circle cx="180" cy="447" r="14"/>                   <!-- Eta Sco, mag 3.32 -->
    <circle cx="52"  cy="394" r="14"/>                   <!-- Iota1 Sco, mag 3.03 -->
    <circle cx="310" cy="192" r="18"/>                   <!-- Tau Sco, mag 2.82 -->
    <circle cx="420" cy="49"  r="20"/>                   <!-- Graffias (beta1), mag 2.50 -->
    <circle cx="71"  cy="376" r="20"/>                   <!-- Kappa Sco, mag 2.41 -->
    <circle cx="438" cy="97"  r="22"/>                   <!-- Dschubba (delta), mag 2.32 -->
    <circle cx="259" cy="295" r="22"/>                   <!-- Larawag (epsilon), mag 2.31 -->
    <circle cx="89"  cy="443" r="24"/>                   <!-- Sargas (theta), mag 1.87 -->
    <circle cx="103" cy="343" r="24"/>                   <!-- Shaula (lambda), mag 1.62 -->
    <circle cx="334" cy="161" r="28"/>                   <!-- Antares (alpha), mag 1.06 -->
  </g>
</svg>
