<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="globe">
      <circle cx="256" cy="256" r="200"/>
    </clipPath>
  </defs>

  <!-- ocean disc -->
  <circle cx="256" cy="256" r="200" fill="#1a5680"/>

  <g clip-path="url(#globe)">
    <!-- Africa (centered, dominant landmass — Apollo Blue Marble view) -->
    <path d="M 250 175 Q 295 165 320 180 Q 335 210 335 250 Q 325 305 305 340 Q 280 365 260 365 Q 235 355 225 320 Q 215 275 225 235 Q 230 200 250 175 Z"
          fill="#4a7050"/>

    <!-- Eurasia (north of Africa, partial visibility) -->
    <path d="M 200 130 Q 280 110 360 130 Q 400 150 410 175 Q 380 190 320 185 Q 260 180 215 165 Q 195 150 200 130 Z"
          fill="#5d7a48"/>

    <!-- Arabian peninsula (sandy desert, between Africa and Asia) -->
    <path d="M 325 165 Q 365 165 375 200 Q 360 220 340 215 Q 325 195 325 165 Z"
          fill="#7a6a48"/>

    <!-- Madagascar (island east of southern Africa) -->
    <ellipse cx="335" cy="320" rx="9" ry="22" fill="#4a7050"/>

    <!-- South America peeking on the left limb -->
    <path d="M 75 230 Q 95 280 90 330 Q 80 345 70 320 Q 60 280 65 240 Q 70 225 75 230 Z"
          fill="#4a7050"/>

    <!-- Antarctic ice cap at the south limb -->
    <ellipse cx="256" cy="448" rx="100" ry="14" fill="#d8e0e8"/>

    <!-- Cloud wisps -->
    <ellipse cx="170" cy="180" rx="42" ry="9"  fill="#ffffff" opacity="0.55"/>
    <ellipse cx="370" cy="280" rx="34" ry="8"  fill="#ffffff" opacity="0.45"/>
    <ellipse cx="220" cy="395" rx="38" ry="9"  fill="#ffffff" opacity="0.50"/>
    <ellipse cx="320" cy="220" rx="22" ry="6"  fill="#ffffff" opacity="0.40"/>
  </g>
</svg>
